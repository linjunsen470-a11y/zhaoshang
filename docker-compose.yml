services:
  payload:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - PAYLOAD_DB_PUSH=${PAYLOAD_DB_PUSH:-true}
      - DATABASE_URI=postgres://${POSTGRES_USER:-payload}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}@db:5432/${POSTGRES_DB:-payload}
      - PAYLOAD_PUBLIC_SERVER_URL=${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    working_dir: /app
    command: ["npx", "tsx", "scripts/push-schema.ts"]
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - PAYLOAD_DB_PUSH=${PAYLOAD_DB_PUSH:-true}
      - DATABASE_URI=postgres://${POSTGRES_USER:-payload}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}@db:5432/${POSTGRES_DB:-payload}
      - PAYLOAD_PUBLIC_SERVER_URL=${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}
      POSTGRES_DB: ${POSTGRES_DB:-payload}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payload} -d ${POSTGRES_DB:-payload}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - payload-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # optional for local debug

volumes:
  payload-data:
